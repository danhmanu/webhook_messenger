<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quan ly tin nhan</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #18212f;
      --muted: #667085;
      --line: #d9dee8;
      --brand: #1464f6;
      --brand-dark: #0c4ec2;
      --danger: #c33232;
      --success: #12715b;
      --shadow: 0 14px 40px rgba(28, 39, 57, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.45;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 22px;
      border-right: 1px solid var(--line);
      background: #eef2f7;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .muted {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
    }

    .icon-button,
    .primary,
    .secondary,
    .danger {
      min-height: 38px;
      border-radius: 8px;
      transition: background 120ms ease, transform 120ms ease, border-color 120ms ease;
    }

    .icon-button {
      width: 38px;
      display: inline-grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .icon-button:hover,
    .secondary:hover {
      background: #f8fafc;
      border-color: #b8c1cf;
    }

    .primary,
    .secondary,
    .danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-weight: 700;
    }

    .primary {
      background: var(--brand);
      color: #ffffff;
    }

    .primary:hover {
      background: var(--brand-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
    }

    .danger {
      background: #fff1f1;
      color: var(--danger);
      border: 1px solid #f0caca;
    }

    .danger:hover {
      background: #ffe4e4;
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 0 12px 0 40px;
      background: #ffffff;
      color: var(--text);
      outline: none;
    }

    .search input:focus,
    .field input:focus,
    .field textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(20, 100, 246, 0.14);
    }

    .list {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      min-height: 0;
    }

    .snippet {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: inherit;
      text-align: left;
    }

    .snippet:hover,
    .snippet.active {
      background: #ffffff;
      border-color: var(--line);
    }

    .snippet strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .snippet span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      align-self: start;
      min-width: 58px;
      padding: 4px 7px;
      border-radius: 999px;
      background: #e8f7f2;
      color: var(--success);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .badge.off {
      background: #eef0f4;
      color: #6d7480;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 20px;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .form {
      display: grid;
      gap: 18px;
      padding: 20px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label,
    .switch label {
      color: #303b4c;
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field textarea {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 11px 12px;
      background: #ffffff;
      color: var(--text);
      outline: none;
    }

    .field textarea {
      min-height: 280px;
      resize: vertical;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actions-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .side-panel {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .switch input {
      width: 44px;
      height: 24px;
      appearance: none;
      border-radius: 999px;
      background: #c7ced9;
      position: relative;
      outline: none;
      cursor: pointer;
    }

    .switch input::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: #ffffff;
      transition: transform 140ms ease;
    }

    .switch input:checked {
      background: var(--brand);
    }

    .switch input:checked::after {
      transform: translateX(20px);
    }

    .meta {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 160px;
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 860px) {
      .shell,
      .editor {
        grid-template-columns: 1fr;
      }

      .sidebar {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .list {
        max-height: 260px;
      }

      .main {
        padding: 20px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>Tin nhan mau</h1>
          <p class="muted"><span id="count">0</span> doan dang luu</p>
        </div>
        <div class="toolbar">
          <button class="icon-button" id="newBtn" type="button" title="Tao moi" aria-label="Tao moi">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="icon-button" id="tokenBtn" type="button" title="Token quan tri" aria-label="Token quan tri">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 7a4 4 0 1 1 2 3.46L22 15v3h-3v-3h-3v-3.54A4 4 0 0 1 15 7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M7 14H5a3 3 0 0 0-3 3v3h10v-3a3 3 0 0 0-3-3H7Zm0 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.2-4.2M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="search" type="search" placeholder="Tim theo tieu de, ma, noi dung">
      </div>

      <div class="list" id="list"></div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div>
          <h1 id="pageTitle">Tao doan tin nhan</h1>
          <p class="muted" id="pageSubtitle">Noi dung dang bat se duoc dua vao ngu canh tra loi Messenger.</p>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="editor">
        <section class="panel form">
          <div class="field">
            <label for="title">Tieu de</label>
            <input id="title" maxlength="120" autocomplete="off">
          </div>
          <div class="field">
            <label for="shortcut">Ma goi nho</label>
            <input id="shortcut" maxlength="80" autocomplete="off">
          </div>
          <div class="field">
            <label for="content">Noi dung</label>
            <textarea id="content" maxlength="2000"></textarea>
          </div>
          <div class="actions">
            <button class="danger" id="deleteBtn" type="button">Xoa</button>
            <div class="actions-group">
              <button class="secondary" id="resetBtn" type="button">Lam moi</button>
              <button class="primary" id="saveBtn" type="button">Luu</button>
            </div>
          </div>
        </section>

        <aside class="panel side-panel">
          <div class="switch">
            <label for="isActive">Dang bat</label>
            <input id="isActive" type="checkbox" checked>
          </div>
          <div class="meta">
            <div>ID: <span id="metaId">Moi</span></div>
            <div>Tao: <span id="metaCreated">-</span></div>
            <div>Cap nhat: <span id="metaUpdated">-</span></div>
            <div>Ky tu: <span id="charCount">0</span>/2000</div>
          </div>
        </aside>
      </div>
    </main>
  </div>

  <script>
    const state = {
      snippets: [],
      selectedId: null,
      token: localStorage.getItem("adminToken") || ""
    };

    const elements = {
      list: document.querySelector("#list"),
      count: document.querySelector("#count"),
      status: document.querySelector("#status"),
      search: document.querySelector("#search"),
      title: document.querySelector("#title"),
      shortcut: document.querySelector("#shortcut"),
      content: document.querySelector("#content"),
      isActive: document.querySelector("#isActive"),
      saveBtn: document.querySelector("#saveBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      deleteBtn: document.querySelector("#deleteBtn"),
      newBtn: document.querySelector("#newBtn"),
      tokenBtn: document.querySelector("#tokenBtn"),
      pageTitle: document.querySelector("#pageTitle"),
      pageSubtitle: document.querySelector("#pageSubtitle"),
      metaId: document.querySelector("#metaId"),
      metaCreated: document.querySelector("#metaCreated"),
      metaUpdated: document.querySelector("#metaUpdated"),
      charCount: document.querySelector("#charCount")
    };

    const api = async (path, options = {}) => {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (state.token) {
        headers["X-Admin-Token"] = state.token;
      }

      const response = await fetch(path, { ...options, headers });

      if (response.status === 401) {
        throw new Error("Token quan tri khong hop le");
      }

      if (!response.ok) {
        throw new Error("Yeu cau khong thanh cong");
      }

      return response.status === 204 ? null : response.json();
    };

    const setStatus = (message, isError = false) => {
      elements.status.textContent = message;
      elements.status.style.color = isError ? "var(--danger)" : "var(--muted)";
    };

    const formatDate = (value) => value ? new Intl.DateTimeFormat("vi-VN", {
      dateStyle: "short",
      timeStyle: "short"
    }).format(new Date(value)) : "-";

    const getFiltered = () => {
      const query = elements.search.value.trim().toLowerCase();

      if (!query) {
        return state.snippets;
      }

      return state.snippets.filter((snippet) => [
        snippet.title,
        snippet.shortcut || "",
        snippet.content
      ].join(" ").toLowerCase().includes(query));
    };

    const renderList = () => {
      const snippets = getFiltered();
      elements.count.textContent = state.snippets.length;
      elements.list.innerHTML = "";

      if (snippets.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Chua co doan phu hop";
        elements.list.append(empty);
        return;
      }

      for (const snippet of snippets) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `snippet${snippet.id === state.selectedId ? " active" : ""}`;
        button.innerHTML = `
          <div>
            <strong></strong>
            <span></span>
          </div>
          <div class="badge${snippet.isActive ? "" : " off"}">${snippet.isActive ? "Bat" : "Tat"}</div>
        `;
        button.querySelector("strong").textContent = snippet.title;
        button.querySelector("span").textContent = snippet.shortcut || snippet.content;
        button.addEventListener("click", () => selectSnippet(snippet.id));
        elements.list.append(button);
      }
    };

    const updateMeta = (snippet) => {
      elements.metaId.textContent = snippet?.id || "Moi";
      elements.metaCreated.textContent = formatDate(snippet?.createdAt);
      elements.metaUpdated.textContent = formatDate(snippet?.updatedAt);
      elements.charCount.textContent = elements.content.value.length;
      elements.deleteBtn.style.visibility = snippet ? "visible" : "hidden";
      elements.pageTitle.textContent = snippet ? "Chinh sua doan tin nhan" : "Tao doan tin nhan";
    };

    const clearForm = () => {
      state.selectedId = null;
      elements.title.value = "";
      elements.shortcut.value = "";
      elements.content.value = "";
      elements.isActive.checked = true;
      updateMeta(null);
      renderList();
      elements.title.focus();
    };

    const selectSnippet = (id) => {
      const snippet = state.snippets.find((item) => item.id === id);

      if (!snippet) {
        clearForm();
        return;
      }

      state.selectedId = id;
      elements.title.value = snippet.title;
      elements.shortcut.value = snippet.shortcut || "";
      elements.content.value = snippet.content;
      elements.isActive.checked = snippet.isActive;
      updateMeta(snippet);
      renderList();
    };

    const readForm = () => ({
      title: elements.title.value.trim(),
      shortcut: elements.shortcut.value.trim() || null,
      content: elements.content.value.trim(),
      isActive: elements.isActive.checked
    });

    const loadSnippets = async () => {
      setStatus("Dang tai...");

      try {
        state.snippets = await api("/api/message-snippets");
        setStatus("Da tai");

        if (state.selectedId && state.snippets.some((snippet) => snippet.id === state.selectedId)) {
          selectSnippet(state.selectedId);
        } else if (state.snippets.length > 0) {
          selectSnippet(state.snippets[0].id);
        } else {
          clearForm();
        }
      } catch (error) {
        setStatus(error.message, true);
      }
    };

    const saveSnippet = async () => {
      const payload = readForm();

      if (!payload.title || !payload.content) {
        setStatus("Can co tieu de va noi dung", true);
        return;
      }

      setStatus("Dang luu...");

      try {
        const saved = state.selectedId
          ? await api(`/api/message-snippets/${state.selectedId}`, { method: "PUT", body: JSON.stringify(payload) })
          : await api("/api/message-snippets", { method: "POST", body: JSON.stringify(payload) });

        await loadSnippets();
        selectSnippet(saved.id);
        setStatus("Da luu");
      } catch (error) {
        setStatus(error.message, true);
      }
    };

    const deleteSnippet = async () => {
      if (!state.selectedId) {
        return;
      }

      const snippet = state.snippets.find((item) => item.id === state.selectedId);

      if (!confirm(`Xoa "${snippet?.title || "doan tin nhan"}"?`)) {
        return;
      }

      setStatus("Dang xoa...");

      try {
        await api(`/api/message-snippets/${state.selectedId}`, { method: "DELETE" });
        state.selectedId = null;
        await loadSnippets();
        setStatus("Da xoa");
      } catch (error) {
        setStatus(error.message, true);
      }
    };

    const setToken = () => {
      const nextToken = prompt("Nhap token quan tri", state.token);

      if (nextToken === null) {
        return;
      }

      state.token = nextToken.trim();

      if (state.token) {
        localStorage.setItem("adminToken", state.token);
      } else {
        localStorage.removeItem("adminToken");
      }

      loadSnippets();
    };

    elements.newBtn.addEventListener("click", clearForm);
    elements.resetBtn.addEventListener("click", () => state.selectedId ? selectSnippet(state.selectedId) : clearForm());
    elements.saveBtn.addEventListener("click", saveSnippet);
    elements.deleteBtn.addEventListener("click", deleteSnippet);
    elements.tokenBtn.addEventListener("click", setToken);
    elements.search.addEventListener("input", renderList);
    elements.content.addEventListener("input", () => {
      elements.charCount.textContent = elements.content.value.length;
    });

    loadSnippets();
  </script>
</body>
</html>
